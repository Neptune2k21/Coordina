name: Quality

on:
  pull_request:
    branches:
      - master
      - develop
  push:
    branches:
      - master
      - develop

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: src/web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm --dir src/web install --frozen-lockfile

      - name: Run quality gate
        run: make quality
